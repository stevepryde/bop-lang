name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - package.json
      - bun.lock
      - .github/workflows/deploy-docs.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages
      url: https://bop-lang.com
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: taiki-e/install-action@v2
        with:
          tool: zola@0.22.1

      - name: Install site tooling
        run: bun install --frozen-lockfile

      - name: Check content and links
        run: bun run site:check

      - name: Build Zola site
        run: bun run site:build

      - name: Deploy to Cloudflare Pages
        run: >
          bunx wrangler pages deploy docs/public
          --project-name=bop-docs
          --branch=main
          --commit-hash=${{ github.sha }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
