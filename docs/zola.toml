base_url = "https://bop-lang.com"
title = "Bop — a small language for teaching and embedding"
description = "Bop is a small, zero-dependency programming language with familiar syntax, friendly errors, sandboxed embedding, and three interchangeable execution engines."
default_language = "en"
author = "Steve Pryde"
output_dir = "public"
compile_sass = false
minify_html = true
build_search_index = true
generate_sitemap = true
generate_robots_txt = true

[markdown]
smart_punctuation = true
bottom_footnotes = true
github_alerts = true
insert_anchor_links = "right"
external_links_target_blank = true
external_links_no_referrer = true

[markdown.highlighting]
error_on_missing_language = true
style = "inline"
light_theme = "github-light"
dark_theme = "github-dark"
extra_grammars = ["syntaxes/bop.tmLanguage.json"]

[link_checker]
internal_level = "error"
external_level = "warn"
skip_prefixes = [
  "https://crates.io/",
  "https://docs.rs/",
]

[search]
include_title = true
include_description = true
include_path = true
include_content = true
truncate_content_length = 6000
index_format = "fuse_json"

[extra]
github_url = "https://github.com/stevepryde/bop-lang"
crates_url = "https://crates.io/crates/bop-lang"
docs_url = "/docs/"
